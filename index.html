<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Tic-Tac-Toe" />
    <!-- <link rel="manifest" href="favicon/site.webmanifest" /> -->
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

    <div class="container">
        <div class="game-container">
            <div class="heading"><h1>Tic Tac Toe</h1></div>
            
            <div class="game">
                <div cellIndex="0" class="cell borderless"></div>
                <div cellIndex="1" class="cell part-borderA"></div>
                <div cellIndex="2" class="cell borderless"></div>
                <div cellIndex="3" class="cell part-borderD"></div>
                <div cellIndex="4" class="cell"></div>
                <div cellIndex="5" class="cell part-borderC"></div>
                <div cellIndex="6" class="cell borderless"></div>
                <div cellIndex="7" class="cell part-borderB"></div>
                <div cellIndex="8" class="cell borderless"></div>
            </div>
            <div class="game-status">
                <h2 id="statusText"></h2>
                <!-- <button class="start-btn">Start</button> -->
                <button class="reset-btn">Reset</button>
            </div>

        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
